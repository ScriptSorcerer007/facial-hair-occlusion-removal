name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Cache pip packages
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
        pip install flask pillow numpy opencv-python tqdm

    - name: Test model imports
      run: |
        python -c "from utils.model import UNetGenerator, PatchGANDiscriminator; print('Models OK')"

    - name: Test dataset imports
      run: |
        python -c "from utils.dataset import FacialHairDataset; print('Dataset OK')"

    - name: Test Flask app starts
      run: |
        python -c "import app; print('App OK')"
      env:
        FLASK_ENV: testing

    - name: Check code style
      run: |
        pip install pyflakes
        pyflakes utils/model.py utils/dataset.py || true